  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    :root { --pad: 10px; }
    body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
    .wrap { display: flex; flex-direction: column; height: 100vh; }

    /* Search bar */
    .topbar {
      padding: var(--pad);
      border-bottom: 1px solid #e5e5e5;
      background: #fff;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    #searchBox {
      width: 100%;
      box-sizing: border-box;
      font-size: 16px;
      padding: 10px 12px;
      border: 1px solid #d6d6d6;
      border-radius: 10px;
      outline: none;
    }
    #searchBox:focus { border-color: #9aa0a6; }

    /* Map + list layout */
    #map { height: 58vh; }
    #list {
      height: 42vh;
      overflow-y: auto;
      padding: 6px var(--pad) var(--pad);
      background: #fff;
    }

    .row {
      padding: 10px 10px;
      border: 1px solid #eee;
      border-radius: 12px;
      margin-top: 8px;
      cursor: pointer;
      background: #fff;
    }
    .row:hover { background: #fafafa; }
    .row .name { font-weight: 700; margin-bottom: 6px; }
    .row .meta { color: #444; font-size: 14px; line-height: 1.35; }

    .count { margin-top: 8px; font-size: 13px; color: #555; }

    /* Popup */
    .popup-title { font-weight: 800; font-size: 16px; margin: 0 0 6px; }
    .popup-desc { margin: 0 0 8px; font-size: 13px; line-height: 1.35; }
    .popup-img {
      width: 100%;
      max-width: 260px;
      height: auto;
      border-radius: 10px;
      display: block;
      margin: 0 0 8px;
    }
    .btns { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn {
      display: inline-block;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid #ddd;
      text-decoration: none;
      color: #111;
      font-size: 13px;
      background: #fff;
    }
    .btn:hover { background: #f3f3f3; }

    /* Desktop: map left, list right */
    @media (min-width: 980px) {
      .main { display: grid; grid-template-columns: 1.6fr 1fr; height: calc(100vh - 72px); }
      #map { height: 100%; }
      #list { height: 100%; border-left: 1px solid #eee; }
    }
  </style>
</head>

  </div>

  </div>
</div>

  // =========================
  function escapeHtml(str) {
    return String(str ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function googleDirectionsLink(lat, lng) {
    // Mở chế độ chỉ đường trong Google Maps (works on mobile)
    return `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`;
  }

  // =========================
  // 3) KHỞI TẠO BẢN ĐỒ
  // =========================
  const map = L.map('map', { zoomControl: true });

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);

  // Tạo marker + fit bounds
  const markersByIndex = [];
  const group = L.featureGroup();

  locations.forEach((loc, idx) => {
    const title = escapeHtml(loc.name);
    const desc = escapeHtml(loc.info);

    const imgHtml = loc.img
      ? `<img class="popup-img" src="${escapeHtml(loc.img)}" alt="${title}" />`
      : "";

    const popupHtml = `
      <div>
        <div class="popup-title">${title}</div>
        ${imgHtml}
        <div class="popup-desc">${desc.replaceAll("\n","<br>")}</div>
        <div class="btns">
           ${loc.link ? `<a class="btn" href="${loc.link}" target="_blank" rel="noopener">Xem chi tiết</a>` : ""}
          <a class="btn" href="${googleDirectionsLink(loc.lat, loc.lng)}" target="_blank" rel="noopener">Chỉ đường</a>
          <a class="btn" href="https://www.google.com/maps?q=${loc.lat},${loc.lng}" target="_blank" rel="noopener">Mở Google Maps</a>
        </div>
      </div>
    `;

    const marker = L.marker([loc.lat, loc.lng]).bindPopup(popupHtml);
    marker.addTo(map);
    markersByIndex[idx] = marker;
    group.addLayer(marker);
  });

  group.addTo(map);
  map.fitBounds(group.getBounds().pad(0.12)); // tự zoom vừa đẹp

  // =========================
  // 4) RENDER DANH SÁCH + SEARCH (CHỈ TRONG 27 ĐIỂM)
  // =========================
  const listEl = document.getElementById("list");
  const countEl = document.getElementById("countInfo");
  const searchEl = document.getElementById("searchBox");

  function render(filterText = "") {
    const q = filterText.trim().toLowerCase();
    listEl.innerHTML = "";

    let shown = 0;

    locations.forEach((loc, idx) => {
      const hay = (loc.name + " " + (loc.info || "")).toLowerCase();
      const match = q === "" || hay.includes(q);

      // Ẩn/hiện marker theo search (giúp “tìm” rõ ràng trên map)
      const m = markersByIndex[idx];
      if (match) {
        if (!map.hasLayer(m)) m.addTo(map);
        shown++;

        const row = document.createElement("div");
        row.className = "row";
        row.innerHTML = `
          <div class="name">${escapeHtml(loc.name)}</div>
          <div class="meta">${escapeHtml(loc.info)}</div>
        `;
        row.onclick = () => {
          map.setView([loc.lat, loc.lng], 17, { animate: true });
          m.openPopup();
        };
        listEl.appendChild(row);
      } else {
        if (map.hasLayer(m)) map.removeLayer(m);
      }
    });

    countEl.textContent = `Đang hiển thị: ${shown}/${locations.length} điểm`;
  }

  searchEl.addEventListener("input", (e) => render(e.target.value));
  render("");

</script>
</body>
</html>
